# ============================================================================
# Docker Swarm stack — SDR WhatsApp GoldIncision
#
# Servicos: app (FastAPI), postgres (persistencia duravel), redis (efemero)
#
# Redes (modelo 2-redes confirmado em 1.3.2):
#   sdr-internal: overlay PRIVADA criada por esta stack (app + postgres + redis)
#                 Postgres e Redis NUNCA expostos a servicos externos
#   network_main: overlay EXTERNA pre-existente no swarm (external: true)
#                 Contém: n8n (n8n_n8n_editor/webhook/worker) + Traefik (traefik_traefik)
#                 Por esta rede: n8n alcanca /webhook/chatmaster internamente via
#                 DNS do servico (http://app:8000/webhook/chatmaster) SEM rota publica
#                 Traefik roteia SOMENTE /admin/* e /health nesta rede
#                 Principio VI: NUNCA modificar servicos n8n/traefik — so referenciar
#
# Labels Traefik: EXCLUSIVAMENTE /admin/* e /health (via network_main)
# /webhook/chatmaster: SEM label Traefik (so alcancavel pela overlay interna — block-001)
#
# Secrets: referenciar secrets pre-criados no Swarm (nunca em texto claro FR-032)
#   docker secret create openai_api_key <(echo "sk-...")
#   docker secret create chatmaster_token <(echo "Bearer ...")
#   docker secret create admin_token <(echo "token-admin-seguro")
#   docker secret create webhook_token <(echo "token-opcional")
# ============================================================================

version: "3.9"

services:

  # --------------------------------------------------------------------------
  # Aplicacao FastAPI — SDR WhatsApp
  # --------------------------------------------------------------------------
  app:
    image: registry.todo-tips.com/sdr-whatsapp:latest
    networks:
      - sdr-internal        # acesso a postgres e redis (overlay privada)
      - network_main        # receber webhook do n8n + roteamento Traefik /admin+/health
    secrets:
      - openai_api_key
      - chatmaster_token
      - admin_token
      # webhook_token: secret versionado (secrets sao imutaveis) montado como
      # /run/secrets/webhook_token. Token real ativo desde a exposicao publica.
      - source: webhook_token_v1
        target: webhook_token
    environment:
      # URLs dos servicos internos (sem credenciais — credenciais via secrets)
      # Nomes COMPLETOS dos servicos (unicos no swarm) — o app esta em duas redes
      # (sdr-internal + network_main) e os aliases curtos "postgres"/"redis"
      # colidiriam com outras stacks (postgres_postgres, n8n-data_redis) em
      # network_main. Os nomes completos so existem na sdr-internal.
      DATABASE_URL: "postgresql+asyncpg://sdr:${POSTGRES_PASSWORD:-sdrsecret}@sdr-whatsapp_postgres:5432/sdr"
      REDIS_URL: "redis://sdr-whatsapp_redis:6379/0"
      # Caminhos para os secrets montados
      OPENAI_API_KEY_FILE: "/run/secrets/openai_api_key"
      CHATMASTER_TOKEN_FILE: "/run/secrets/chatmaster_token"
      ADMIN_TOKEN_FILE: "/run/secrets/admin_token"
      WEBHOOK_TOKEN_FILE: "/run/secrets/webhook_token"
      # Configuracoes nao-sensiveis
      OPENAI_MODEL_REASONING: "${OPENAI_MODEL_REASONING:-gpt-4o}"
      OPENAI_MODEL_CHEAP: "${OPENAI_MODEL_CHEAP:-gpt-4o-mini}"
      DEBOUNCE_SECONDS: "${DEBOUNCE_SECONDS:-8}"
      CHATMASTER_BASE_URL: "${CHATMASTER_BASE_URL:-https://api.chatmasterveloz.com}"
      NIDIA_PHONE: "${NIDIA_PHONE:-}"
      # Handoff humano (API Atualizar Ticket): queueId da fila humana.
      HANDOFF_QUEUE_ID_DEFAULT: "${HANDOFF_QUEUE_ID_DEFAULT:-}"
      HANDOFF_QUEUE_IDS_JSON: "${HANDOFF_QUEUE_IDS_JSON:-}"
      # Reset de jornada (#reset): frase + numeros que SEMEIAM a tabela
      # numero_teste (gestao dinamica via admin API /admin/numeros-teste).
      RESET_COMMAND: "${RESET_COMMAND:-#reset}"
      RESET_TEST_NUMBERS: "${RESET_TEST_NUMBERS:-5511967296849,5511941410998}"
      # Controle de turnos (Pilar 7 — G1-G6).
      MAX_TURNOS_NO_NO: "${MAX_TURNOS_NO_NO:-6}"
      MAX_TURNOS_SESSAO: "${MAX_TURNOS_SESSAO:-25}"
      MAX_TURNOS_DUVIDAS: "${MAX_TURNOS_DUVIDAS:-12}"
      REENGAJAMENTO_HORAS: "${REENGAJAMENTO_HORAS:-24}"
      EXPIRA_SESSAO_HORAS: "${EXPIRA_SESSAO_HORAS:-72}"
      LOCK_TTL_MS: "${LOCK_TTL_MS:-90000}"
      # Pacing / anti-rajada (respeito ao rate limit da WhatsApp Cloud API).
      # Defaults conservadores; ajustar conforme o limite real do ChatMaster/Meta.
      WHATSAPP_MIN_INTERVAL_MS: "${WHATSAPP_MIN_INTERVAL_MS:-1000}"
      MAX_MSGS_PER_TURN: "${MAX_MSGS_PER_TURN:-4}"
      INTER_BLOCK_DELAY_SECONDS: "${INTER_BLOCK_DELAY_SECONDS:-1.0}"
      # Concisao das respostas geradas (teto de tokens do raciocinio).
      REASONING_MAX_TOKENS: "${REASONING_MAX_TOKENS:-280}"
      # Portao de Fidelidade (Pilar 7): teto (hard) do FidelityGate.verificar();
      # timeout/erro conta SEMPRE como fiel=False (fail-closed).
      VERIFY_TIMEOUT_SECONDS: "${VERIFY_TIMEOUT_SECONDS:-3}"
      # Interpretacao Agentica / Slot-Filling (Pilar 8): limiar minimo de
      # confianca para aceitar um slot extraido pelo fallback agentico.
      SLOT_CONFIDENCE_THRESHOLD: "${SLOT_CONFIDENCE_THRESHOLD:-0.6}"
      # RAG Hibrido (Onda 3): recuperacao ancorada com abstencao. Pre-condicao
      # de infraestrutura: imagem pgvector/pgvector:pg16 no servico postgres
      # (ver secao "Pre-condicao de merge/deploy" no PR) — ate la, o mecanismo
      # opera em modo tolerante (abstencao/nao-fatal), nunca quebra o boot.
      RAG_EMBEDDING_MODEL: "${RAG_EMBEDDING_MODEL:-text-embedding-3-small}"
      RAG_LIMIAR_ABSTENCAO: "${RAG_LIMIAR_ABSTENCAO:-0.45}"
      RAG_K_VETORIAL: "${RAG_K_VETORIAL:-20}"
      RAG_K_TEXTUAL: "${RAG_K_TEXTUAL:-20}"
      RAG_TOP_K: "${RAG_TOP_K:-5}"
      RAG_RETRIEVAL_TIMEOUT_SECONDS: "${RAG_RETRIEVAL_TIMEOUT_SECONDS:-3.0}"
      RAG_CACHE_ENABLED: "${RAG_CACHE_ENABLED:-false}"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        # Traefik: habilitar apenas para este servico
        - "traefik.enable=true"
        - "traefik.docker.network=network_main"
        # Router para /admin/* (autenticado por token interno — nao por Traefik)
        - "traefik.http.routers.sdr-admin.rule=Host(`${SDR_HOST:-sdr.todo-tips.com}`) && PathPrefix(`/admin`)"
        - "traefik.http.routers.sdr-admin.entrypoints=web,websecure"
        - "traefik.http.routers.sdr-admin.tls=true"
        - "traefik.http.routers.sdr-admin.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.sdr-admin.service=sdr-app"
        # Router para /health (publico para Traefik healthcheck)
        - "traefik.http.routers.sdr-health.rule=Host(`${SDR_HOST:-sdr.todo-tips.com}`) && Path(`/health`)"
        - "traefik.http.routers.sdr-health.entrypoints=web,websecure"
        - "traefik.http.routers.sdr-health.tls=true"
        - "traefik.http.routers.sdr-health.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.sdr-health.service=sdr-app"
        # Router para /webhook/chatmaster (EXPOSTO para o ChatMaster chamar direto).
        # Protegido por token: o app valida ?token= (query) OU header X-Webhook-Token.
        - "traefik.http.routers.sdr-webhook.rule=Host(`${SDR_HOST:-sdr.todo-tips.com}`) && Path(`/webhook/chatmaster`)"
        - "traefik.http.routers.sdr-webhook.entrypoints=web,websecure"
        - "traefik.http.routers.sdr-webhook.tls=true"
        - "traefik.http.routers.sdr-webhook.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.sdr-webhook.service=sdr-app"
        # Servico (porta interna)
        - "traefik.http.services.sdr-app.loadbalancer.server.port=8000"
        # NOTA: /webhook/chatmaster NAO tem label Traefik — apenas overlay interna

  # --------------------------------------------------------------------------
  # PostgreSQL — persistencia duravel (contatos, historico, catalogo)
  # --------------------------------------------------------------------------
  # RAG Hibrido (Onda 3, dec-013, FR-024-INFRA-PRECONDITION): imagem trocada de
  # postgres:16-alpine para pgvector/pgvector:pg16 (mesma base PG16, volume
  # sdr-whatsapp_postgres_data compativel — sem perda de dados) para habilitar
  # `CREATE EXTENSION vector` (tabela chunk/embeddings). Ate o OPERADOR
  # redeployar SOMENTE este servico (sdr-whatsapp_postgres) na janela de
  # infraestrutura dele, o app continua rodando normalmente contra a imagem
  # antiga em producao (Alembic/rag_seed sao nao-fatais — research.md
  # Decision 0/6): a feature simplesmente abstem-se sempre nas duvidas ate o
  # swap ser aplicado. Ver secao "Pre-condicao de merge/deploy" do PR.
  postgres:
    image: pgvector/pgvector:pg16
    networks:
      - sdr-internal        # isolado — nao exposto ao Traefik nem ao n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "sdr"
      POSTGRES_USER: "sdr"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sdrsecret}"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdr -d sdr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redis — estado efemero (debounce, locks, idempotencia, janela quente)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    networks:
      - sdr-internal        # isolado — nao exposto ao Traefik nem ao n8n
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  # Overlay propria da stack (app + postgres + redis)
  sdr-internal:
    driver: overlay
    attachable: false

  # Overlay compartilhada confirmada em 1.3.2 (inspecao do no manager):
  #   docker network inspect network_main
  #   Encontrado: n8n_n8n_editor, n8n_n8n_webhook, n8n_n8n_worker, traefik_traefik
  # NAO criar, NAO modificar — apenas referenciar (Principio VI)
  network_main:
    external: true
    name: "network_main"

secrets:
  openai_api_key:
    external: true
  chatmaster_token:
    external: true
  admin_token:
    external: true
  webhook_token_v1:
    external: true
