# ============================================================================
# Docker Swarm stack — SDR WhatsApp GoldIncision
#
# Servicos: app (FastAPI), postgres (persistencia duravel), redis (efemero)
#
# Redes (modelo 2-redes confirmado em 1.3.2):
#   sdr-internal: overlay PRIVADA criada por esta stack (app + postgres + redis)
#                 Postgres e Redis NUNCA expostos a servicos externos
#   network_main: overlay EXTERNA pre-existente no swarm (external: true)
#                 Contém: n8n (n8n_n8n_editor/webhook/worker) + Traefik (traefik_traefik)
#                 Por esta rede: n8n alcanca /webhook/chatmaster internamente via
#                 DNS do servico (http://app:8000/webhook/chatmaster) SEM rota publica
#                 Traefik roteia SOMENTE /admin/* e /health nesta rede
#                 Principio VI: NUNCA modificar servicos n8n/traefik — so referenciar
#
# Labels Traefik: EXCLUSIVAMENTE /admin/* e /health (via network_main)
# /webhook/chatmaster: SEM label Traefik (so alcancavel pela overlay interna — block-001)
#
# Secrets: referenciar secrets pre-criados no Swarm (nunca em texto claro FR-032)
#   docker secret create openai_api_key <(echo "sk-...")
#   docker secret create chatmaster_token <(echo "Bearer ...")
#   docker secret create admin_token <(echo "token-admin-seguro")
#   docker secret create webhook_token <(echo "token-opcional")
# ============================================================================

version: "3.9"

services:

  # --------------------------------------------------------------------------
  # Aplicacao FastAPI — SDR WhatsApp
  # --------------------------------------------------------------------------
  app:
    image: registry.todo-tips.com/sdr-whatsapp:latest
    networks:
      - sdr-internal        # acesso a postgres e redis (overlay privada)
      - network_main        # receber webhook do n8n + roteamento Traefik /admin+/health
    secrets:
      - openai_api_key
      - chatmaster_token
      - admin_token
      - webhook_token
    environment:
      # URLs dos servicos internos (sem credenciais — credenciais via secrets)
      # Nomes COMPLETOS dos servicos (unicos no swarm) — o app esta em duas redes
      # (sdr-internal + network_main) e os aliases curtos "postgres"/"redis"
      # colidiriam com outras stacks (postgres_postgres, n8n-data_redis) em
      # network_main. Os nomes completos so existem na sdr-internal.
      DATABASE_URL: "postgresql+asyncpg://sdr:${POSTGRES_PASSWORD:-sdrsecret}@sdr-whatsapp_postgres:5432/sdr"
      REDIS_URL: "redis://sdr-whatsapp_redis:6379/0"
      # Caminhos para os secrets montados
      OPENAI_API_KEY_FILE: "/run/secrets/openai_api_key"
      CHATMASTER_TOKEN_FILE: "/run/secrets/chatmaster_token"
      ADMIN_TOKEN_FILE: "/run/secrets/admin_token"
      WEBHOOK_TOKEN_FILE: "/run/secrets/webhook_token"
      # Configuracoes nao-sensiveis
      OPENAI_MODEL_REASONING: "${OPENAI_MODEL_REASONING:-gpt-4o}"
      OPENAI_MODEL_CHEAP: "${OPENAI_MODEL_CHEAP:-gpt-4o-mini}"
      DEBOUNCE_SECONDS: "${DEBOUNCE_SECONDS:-8}"
      CHATMASTER_BASE_URL: "${CHATMASTER_BASE_URL:-https://api2.chatmasterveloz.com}"
      NIDIA_PHONE: "${NIDIA_PHONE:-}"
      # Handoff humano (API Atualizar Ticket): queueId da fila humana.
      HANDOFF_QUEUE_ID_DEFAULT: "${HANDOFF_QUEUE_ID_DEFAULT:-}"
      HANDOFF_QUEUE_IDS_JSON: "${HANDOFF_QUEUE_IDS_JSON:-}"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        # Traefik: habilitar apenas para este servico
        - "traefik.enable=true"
        - "traefik.docker.network=network_main"
        # Router para /admin/* (autenticado por token interno — nao por Traefik)
        - "traefik.http.routers.sdr-admin.rule=Host(`${SDR_HOST:-sdr.todo-tips.com}`) && PathPrefix(`/admin`)"
        - "traefik.http.routers.sdr-admin.entrypoints=websecure"
        - "traefik.http.routers.sdr-admin.tls=true"
        - "traefik.http.routers.sdr-admin.tls.certresolver=letsencrypt"
        - "traefik.http.routers.sdr-admin.service=sdr-app"
        # Router para /health (publico para Traefik healthcheck)
        - "traefik.http.routers.sdr-health.rule=Host(`${SDR_HOST:-sdr.todo-tips.com}`) && Path(`/health`)"
        - "traefik.http.routers.sdr-health.entrypoints=websecure"
        - "traefik.http.routers.sdr-health.tls=true"
        - "traefik.http.routers.sdr-health.tls.certresolver=letsencrypt"
        - "traefik.http.routers.sdr-health.service=sdr-app"
        # Servico (porta interna)
        - "traefik.http.services.sdr-app.loadbalancer.server.port=8000"
        # NOTA: /webhook/chatmaster NAO tem label Traefik — apenas overlay interna

  # --------------------------------------------------------------------------
  # PostgreSQL — persistencia duravel (contatos, historico, catalogo)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    networks:
      - sdr-internal        # isolado — nao exposto ao Traefik nem ao n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "sdr"
      POSTGRES_USER: "sdr"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-sdrsecret}"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdr -d sdr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redis — estado efemero (debounce, locks, idempotencia, janela quente)
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    networks:
      - sdr-internal        # isolado — nao exposto ao Traefik nem ao n8n
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  # Overlay propria da stack (app + postgres + redis)
  sdr-internal:
    driver: overlay
    attachable: false

  # Overlay compartilhada confirmada em 1.3.2 (inspecao do no manager):
  #   docker network inspect network_main
  #   Encontrado: n8n_n8n_editor, n8n_n8n_webhook, n8n_n8n_worker, traefik_traefik
  # NAO criar, NAO modificar — apenas referenciar (Principio VI)
  network_main:
    external: true
    name: "network_main"

secrets:
  openai_api_key:
    external: true
  chatmaster_token:
    external: true
  admin_token:
    external: true
  webhook_token:
    external: true
