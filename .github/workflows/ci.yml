name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancela execucoes antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Testes (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias (app + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check app/ tests/

      - name: Pytest
        # A suite e self-contained: OpenAI/ChatMaster/Postgres/Redis sao mockados,
        # nao exige servicos externos.
        run: pytest -q
